name: Lint Agents

on:
  push:
    branches:
      - main
      - develop
    paths:
      - '**.md'
      - '!docs/adr/**'
      - '.github/workflows/lint-agents.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - '**.md'
      - '!docs/adr/**'
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    name: Validate Agent Collection

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PowerShell
        run: |
          # PowerShell 7 is already installed on ubuntu-latest
          pwsh --version

      - name: Run agent linting
        run: |
          cd $GITHUB_WORKSPACE
          pwsh -Command "./scripts/lint-agents.ps1 -Verbose" -ErrorAction Stop

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ Agent validation failed. Please run `./scripts/lint-agents.ps1` locally and fix any errors before pushing.\n\nSee [CONTEXT.md](https://github.com/${{ github.repository }}/blob/${{ github.head_ref }}/CONTEXT.md) and [ADRs](https://github.com/${{ github.repository }}/tree/${{ github.head_ref }}/docs/adr/) for validation rules.'
            })

      - name: Comment PR on success
        if: success() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ All agents validated successfully!'
            })
